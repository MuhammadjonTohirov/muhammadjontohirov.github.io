<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOX LLC — Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1d1d1f;
            background: #fff;
            line-height: 1.6;
        }
        .hero {
            text-align: center;
            padding: 80px 20px 48px;
            background: linear-gradient(180deg, #f5f5f7 0%, #fff 100%);
        }
        .hero h1 {
            font-size: 2.6em;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }
        .hero p {
            font-size: 1.15em;
            color: #6e6e73;
            max-width: 520px;
            margin: 0 auto;
        }
        .apps {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .app-card {
            display: block;
            background: #f5f5f7;
            border-radius: 18px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .app-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }
        .app-icon {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            display: block;
            object-fit: cover;
            margin-bottom: 16px;
        }
        .app-card h2 {
            font-size: 1.2em;
            margin-bottom: 4px;
        }
        .app-card p {
            font-size: 0.95em;
            color: #6e6e73;
        }
        .app-card .platforms {
            margin-top: 12px;
            font-size: 0.8em;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .links {
            text-align: center;
            padding: 40px 20px 60px;
            border-top: 1px solid #e5e5e5;
        }
        .links a {
            color: #007AFF;
            text-decoration: none;
            margin: 0 16px;
            font-size: 0.95em;
        }
        .links a:hover { text-decoration: underline; }
        footer {
            text-align: center;
            padding: 20px;
            color: #86868b;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>TOX LLC</h1>
        <p>Simple, private, native apps for iOS and macOS.</p>
    </div>

    <div class="apps">
        <div class="app-grid">
            <a class="app-card" href="apps/bookletpdf/index.html">
                <img class="app-icon" src="apps/bookletpdf/logo.png" alt="BookletPDF logo">
                <h2>BookletPDF</h2>
                <p>Convert any PDF into a printable booklet. Fold, staple, and read.</p>
                <div class="platforms">iOS · macOS</div>
            </a>
            <a class="app-card" href="apps/alifsafari/index.html">
                <img class="app-icon" src="apps/alifsafari/logo.jpg" alt="Alif Safari logo">
                <h2>Alif Safari</h2>
                <p>Learn the Arabic alphabet through tracing, pronunciation, and quizzes.</p>
                <div class="platforms">iOS</div>
            </a>
        </div>
    </div>

    <div class="links">
        <a href="mailto:tokhirov.mukhammadjon@gmail.com">Contact</a>
    </div>

    <footer>
        &copy; 2025 TOX LLC. All rights reserved.
    </footer>
</body>
</html>
